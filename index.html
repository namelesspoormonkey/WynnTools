<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">

  <!-- favicon -->
  <link rel="icon" href="https://wynnbuilder.github.io/favicon.ico">

  <title>Wynncraft Hub</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0f1115;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    a {
      text-decoration: none;
      color: #ffffff;
      background: #1a1d24;
      padding: 18px 22px;
      border-radius: 14px;
      text-align: center;
      font-size: 15px;
      transition: background 0.15s ease, transform 0.05s ease;
      user-select: none;
      line-height: 1.3;
    }

    a:hover {
      background: #242834;
    }

    a:active {
      transform: scale(0.97);
    }

    .hint {
      font-size: 12px;
      opacity: 0.55;
      margin-top: 6px;
    }
  </style>

  <script>
    document.addEventListener("keydown", (e) => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;

      switch (e.key) {
        case "1":
          location.href = "https://wynnbuilder-beta.github.io/builder/#CT0X6G5mRE0UkfFXQkfV4ymWJWJWJWJWJ0da0Hm33E1E1E1E1E1SI2Wy4koXicRyzgNLjgLjg0a-HlkXdf+U";
          break;
        case "2":
          location.href = "https://wynnbuilder-beta.github.io/builder/#CT00QIvaWBbJBfKEOrIvW0Y1AmxXBCeg95NQFlKxN+4o6";
          break;
        case "3":
          location.href = "https://wynnbuilder-beta.github.io/builder/#CT0F+myE0I4e5n66USmkHAZHtK0V0etsVmVEf3c0";
          break;
        case "4":
          location.href = "https://wynn.azael.moe/";
          break;
        case "5":
          location.href = "https://wynnbuilder.github.io/items/";
          break;
        case "6":
          location.href = "https://wynnbuilder.github.io/crafter/#40w3w3w3w3w3wtc81";
          break;
        case "7":
          location.href = "https://wynnbuilder-beta.github.io/builder/#";
          break;
        case "8":
          location.href = "https://www.wynnpool.com/";
          break;
      }
    });
  </script>
</head>

<body>
  <div class="container">
    <a href="https://wynnbuilder-beta.github.io/builder/#CT0X6G5mRE0UkfFXQkfV4ymWJWJWJWJWJ0da0Hm33E1E1E1E1E1SI2Wy4koXicRyzgNLjgLjg0a-HlkXdf+U">
      Monster LB
      <div class="hint">Press 1</div>
    </a>

    <a href="https://wynnbuilder-beta.github.io/builder/#CT00QIvaWBbJBfKEOrIvW0Y1AmxXBCeg95NQFlKxN+4o6">
      Idol LR
      <div class="hint">Press 2</div>
    </a>

    <a href="https://wynnbuilder-beta.github.io/builder/#CT0F+myE0I4e5n66USmkHAZHtK0V0etsVmVEf3c0">
      Guardian
      <div class="hint">Press 3</div>
    </a>

    <a href="https://wynn.azael.moe/">
      WynnMounts
      <div class="hint">Press 4</div>
    </a>

    <a href="https://wynnbuilder.github.io/items/">
      WynnAtlas
      <div class="hint">Press 5</div>
    </a>

    <a href="https://wynnbuilder.github.io/crafter/#40w3w3w3w3w3wtc81">
      WynnCrafter
      <div class="hint">Press 6</div>
    </a>

    <a href="https://wynnbuilder-beta.github.io/builder/#">
      WynnBuilder
      <div class="hint">Press 7</div>
    </a>

    <a href="https://www.wynnpool.com/">
      WynnPool
      <div class="hint">Press 8</div>
    </a>
  </div>
</body>
</html>
